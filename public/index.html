<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OpenSnake Multiplayer</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- Tela de lobby -->
  <div id="lobby">
    <h1>🐍 OpenSnake</h1>
    
    <div id="lobby-tabs">
      <button class="tab-btn active" data-tab="create">Criar Sala</button>
      <button class="tab-btn" data-tab="join">Entrar em Sala</button>
    </div>

    <div id="tab-create" class="tab-content active">
      <input type="text" id="playerNameCreate" placeholder="Seu nome (opcional)" maxlength="12">
      <div class="bot-selector">
        <label>Bots na sala:</label>
        <div class="bot-controls">
          <button id="botMinus">-</button>
          <span id="botCount">2</span>
          <button id="botPlus">+</button>
        </div>
      </div>
      <button id="createRoomBtn">🎮 Criar Sala</button>
    </div>

    <div id="tab-join" class="tab-content">
      <input type="text" id="playerNameJoin" placeholder="Seu nome (opcional)" maxlength="12">
      <div id="join-area">
        <input type="text" id="roomCodeInput" placeholder="Código" maxlength="4" autocomplete="off">
        <button id="joinRoomBtn">▶ Entrar</button>
      </div>
    </div>

    <p id="lobby-message"></p>
    <div id="room-info" style="display: none;">
      <p>Sala: <strong id="roomCodeDisplay"></strong></p>
      <p>Compartilhe este código com seus amigos!</p>
    </div>
  </div>

  <!-- Tela do jogo -->
  <div id="game-container" style="display: none;">
    <div id="game-area">
      <canvas id="gameCanvas" width="800" height="600"></canvas>
      <div id="bot-controls">
        <button id="addBotBtn" title="Adicionar bot">➕ Bot</button>
      </div>
    </div>
    <div id="sidebar">
      <div id="timer">⏱ 60</div>
      <h3>🏆 Placar</h3>
      <ul id="scoreboard"></ul>
      <div id="chat-box">
        <ul id="chat-messages"></ul>
        <div id="chat-input-area">
          <input type="text" id="chatInput" placeholder="Chat..." maxlength="60">
        </div>
      </div>
    </div>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script src="client.js"></script>
</body>
</html>
